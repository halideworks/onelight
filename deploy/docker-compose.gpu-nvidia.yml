services:
  onelight-worker:
    environment:
      ONELIGHT_HWACCEL: nvenc
      ONELIGHT_NVENC_DEVICE: ${ONELIGHT_NVENC_DEVICE:-0}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: video,utility,compute
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

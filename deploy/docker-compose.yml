services:
  onelight:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_PATH: /data/onelight.db
      BLOB_ROOT: /data/blobs
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Compose only passes what is named here, so a setting documented in
      # .env.example but missing from this list is silently ignored no matter
      # what the operator puts in .env.
      TRUST_PROXY: ${TRUST_PROXY:-false}
      # Extra origins the CSRF check accepts. Needed whenever the deployment is
      # reached by a name PUBLIC_URL does not carry -- otherwise login fails
      # with "The request origin is not allowed."
      ONELIGHT_ALLOWED_ORIGINS: ${ONELIGHT_ALLOWED_ORIGINS:-}
      ONELIGHT_WORKSPACE_NAME: ${ONELIGHT_WORKSPACE_NAME:-Onelight}
      # Blob sweeper. Without this the server only ever REPORTS orphaned
      # objects: every thumbnail, proxy and watermarked render belonging to a
      # deleted asset, share or project stays on disk forever. Compose passes
      # only what is named here, so leaving it out meant .env could not turn it
      # on no matter what it said.
      ONELIGHT_GC_DELETE: ${ONELIGHT_GC_DELETE:-false}
      WORKER_URL: ${WORKER_URL:-http://onelight-worker:8080}
      WORKER_SECRET: ${WORKER_SECRET:?WORKER_SECRET is required}
      # Outgoing email: set SMTP_URL (or the discrete SMTP_HOST/SMTP_PORT/
      # SMTP_USER/SMTP_PASS/SMTP_SECURE settings) together with MAIL_FROM in
      # .env to enable it. These were commented out until 2026-07-17, which
      # meant a .env with SMTP settings was silently ignored, the exact trap
      # the note above describes.
      SMTP_URL: ${SMTP_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      MAIL_FROM: ${MAIL_FROM:-}
    volumes:
      - onelight-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  onelight-worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
      WORKER_SECRET: ${WORKER_SECRET:?WORKER_SECRET is required}
    volumes:
      - onelight-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8080/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  onelight-data:

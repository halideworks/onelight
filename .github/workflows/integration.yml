# Full-stack integration: build the real compose stack (server + media
# worker), then drive it end to end with scripts/integration-e2e.mjs from
# the runner: setup, multipart upload with CRC32C, probe and transcode,
# proxy colorimetry and tmcd assertions via ffprobe, Range serving, the
# watermarked share flow (202 while pending, burned rendition differs from
# the clean proxy), a Resolve marker EDL export, and an HDR PQ leg that
# exercises libplacebo on lavapipe inside the worker container. The browser
# e2e suite (e2e/, Firefox in the Playwright container) then runs against
# the project and transcoded assets that exercise left behind, reaching the
# stack on the runner's LAN address so it is a distinct, non-localhost
# origin (admitted via ONELIGHT_ALLOWED_ORIGINS, which this exercises too).
# Finishes by asserting the server shuts down gracefully within 15 seconds
# of SIGTERM.
name: Integration

on:
  push:
  pull_request:

jobs:
  full-stack:
    runs-on: ubuntu-latest
    env:
      # Throwaway CI-only values; the compose file refuses to start without
      # SECRET_KEY (min 32 chars) and WORKER_SECRET.
      SECRET_KEY: integration-only-secret-key-0123456789abcdefghij
      WORKER_SECRET: integration-only-worker-secret-0123456789
      PUBLIC_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # ffmpeg synthesizes the test clips on the runner and ffprobe verifies
      # the downloaded proxies; dejavu supplies the drawtext counter font.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu-core
      # The workspace install lets the e2e script compute CRC32C through the
      # product implementation (@onelight/core via tsx).
      - run: pnpm install --frozen-lockfile
      # The browser suite must reach the stack on a non-localhost origin
      # (localhost is always a secure context and would hide that class of
      # bug; see e2e/README.md), so the runner's own address is admitted as
      # an extra origin for the CSRF check.
      - name: Admit the runner's LAN address as a browser origin
        run: |
          runner_ip=$(hostname -I | awk '{print $1}')
          echo "RUNNER_IP=${runner_ip}" >> "$GITHUB_ENV"
          echo "ONELIGHT_ALLOWED_ORIGINS=http://${runner_ip}:3000" >> "$GITHUB_ENV"
      - name: Build and start the stack (waits on both healthchecks)
        run: docker compose -f deploy/docker-compose.yml up -d --build --wait --wait-timeout 300
      - name: Run the end-to-end exercise
        run: node scripts/integration-e2e.mjs
        env:
          ONELIGHT_E2E_STATE_FILE: ${{ runner.temp }}/e2e-state.json
      # The browser suite (Firefox: the bundled Playwright Chromium has no
      # H.264) drives the share room, presentation room, annotations,
      # attachments, and settings surfaces against the project the exercise
      # just transcoded. The playwright npm version must match the
      # container tag so the driver finds the image's browsers.
      - name: Browser end-to-end suite
        env:
          STATE_FILE: ${{ runner.temp }}/e2e-state.json
        run: |
          project_id=$(node -p 'JSON.parse(require("fs").readFileSync(process.env.STATE_FILE, "utf8")).project_id')
          docker run --rm --network host \
            -v "$PWD/e2e:/e2e" -w /e2e \
            -e BASE_URL="http://${RUNNER_IP}:3000" \
            -e E2E_EMAIL=e2e-admin@example.com \
            -e E2E_PASSWORD=integration-only-password \
            -e E2E_PROJECT_ID="$project_id" \
            mcr.microsoft.com/playwright:v1.56.1-noble \
            sh -c 'npm i --silent --no-save playwright@1.56.1 >/dev/null 2>&1 && node share-flows.e2e.mjs && node settings.e2e.mjs && node review-room.e2e.mjs'
      - name: Graceful shutdown within 15 seconds
        run: |
          started=$(date +%s)
          docker compose -f deploy/docker-compose.yml stop -t 15
          elapsed=$(( $(date +%s) - started ))
          echo "docker compose stop completed in ${elapsed}s"
          server_id=$(docker compose -f deploy/docker-compose.yml ps -a -q onelight)
          exit_code=$(docker inspect -f '{{.State.ExitCode}}' "$server_id")
          echo "server container exit code: ${exit_code}"
          test "$elapsed" -le 15
          test "$exit_code" = "0"
      - name: Dump service logs
        if: failure()
        run: docker compose -f deploy/docker-compose.yml logs --no-color

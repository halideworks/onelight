  <rect x="5" y="8" width="5" height="16" rx="1.2" fill="#2c3f56"/>
  <rect x="11" y="8" width="5" height="16" rx="1.2" fill="#934337"/>
  <rect x="17" y="8" width="5" height="16" rx="1.2" fill="#cf8a56"/>
  <rect x="23" y="8" width="4" height="16" rx="1.2" fill="#F7E1A0"/>
</svg>
